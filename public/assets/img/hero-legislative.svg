<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-leg" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#111b3c"/>
      <stop offset="100%" stop-color="#1a2755"/>
    </linearGradient>
    <radialGradient id="dome-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-leg"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="1920" height="500" fill="url(#bg-leg)"/>

  <!-- Background glow -->
  <ellipse cx="960" cy="280" rx="600" ry="300" fill="#1e40af" opacity="0.04" filter="url(#blur-leg)"/>
  <ellipse cx="300" cy="300" rx="250" ry="200" fill="#312e81" opacity="0.04" filter="url(#blur-leg)"/>
  <ellipse cx="1600" cy="280" rx="250" ry="200" fill="#1e3a5f" opacity="0.04" filter="url(#blur-leg)"/>

  <!-- Batasang Pambansa complex silhouette -->
  <g transform="translate(460, 160)">
    <!-- Main trapezoidal body -->
    <polygon points="100,200 0,340 1000,340 900,200" fill="white" opacity="0.06"/>
    <!-- Upper level -->
    <polygon points="200,140 150,200 850,200 800,140" fill="white" opacity="0.07"/>
    <!-- Central facade -->
    <rect x="350" y="100" width="300" height="240" fill="white" opacity="0.08"/>
    <!-- Grand windows (vertical slats) -->
    <g stroke="white" stroke-width="2" opacity="0.05">
      <line x1="370" y1="105" x2="370" y2="330"/>
      <line x1="390" y1="105" x2="390" y2="330"/>
      <line x1="410" y1="105" x2="410" y2="330"/>
      <line x1="430" y1="105" x2="430" y2="330"/>
      <line x1="450" y1="105" x2="450" y2="330"/>
      <line x1="470" y1="105" x2="470" y2="330"/>
      <line x1="490" y1="105" x2="490" y2="330"/>
      <line x1="510" y1="105" x2="510" y2="330"/>
      <line x1="530" y1="105" x2="530" y2="330"/>
      <line x1="550" y1="105" x2="550" y2="330"/>
      <line x1="570" y1="105" x2="570" y2="330"/>
      <line x1="590" y1="105" x2="590" y2="330"/>
      <line x1="610" y1="105" x2="610" y2="330"/>
      <line x1="630" y1="105" x2="630" y2="330"/>
    </g>
    <!-- Dome -->
    <ellipse cx="500" cy="100" rx="120" ry="50" fill="white" opacity="0.06"/>
    <ellipse cx="500" cy="95" rx="80" ry="30" fill="white" opacity="0.04"/>
    <!-- Dome glow -->
    <ellipse cx="500" cy="80" rx="150" ry="80" fill="url(#dome-glow)"/>
    <!-- Flag on dome -->
    <line x1="500" y1="50" x2="500" y2="20" stroke="white" stroke-width="0.8" opacity="0.08"/>
    <rect x="500" y="20" width="14" height="8" fill="#3b82f6" opacity="0.06"/>
    <!-- Steps -->
    <rect x="-20" y="340" width="1040" height="5" rx="1" fill="white" opacity="0.05"/>
    <rect x="-30" y="345" width="1060" height="4" rx="1" fill="white" opacity="0.03"/>
  </g>

  <!-- Legislative scroll elements (decorative) -->
  <g transform="translate(200, 200)" opacity="0.04">
    <path d="M0 0 L60 0 L60 80 Q55 85 50 80 L50 10 L0 10 Z" fill="white" stroke="white" stroke-width="0.5"/>
    <line x1="10" y1="20" x2="45" y2="20" stroke="white" stroke-width="0.8"/>
    <line x1="10" y1="28" x2="42" y2="28" stroke="white" stroke-width="0.8"/>
    <line x1="10" y1="36" x2="40" y2="36" stroke="white" stroke-width="0.8"/>
    <line x1="10" y1="44" x2="38" y2="44" stroke="white" stroke-width="0.8"/>
    <line x1="10" y1="52" x2="35" y2="52" stroke="white" stroke-width="0.8"/>
  </g>

  <g transform="translate(1660, 180)" opacity="0.04">
    <path d="M60 0 L0 0 L0 80 Q5 85 10 80 L10 10 L60 10 Z" fill="white" stroke="white" stroke-width="0.5"/>
    <line x1="15" y1="20" x2="50" y2="20" stroke="white" stroke-width="0.8"/>
    <line x1="18" y1="28" x2="50" y2="28" stroke="white" stroke-width="0.8"/>
    <line x1="20" y1="36" x2="50" y2="36" stroke="white" stroke-width="0.8"/>
    <line x1="22" y1="44" x2="50" y2="44" stroke="white" stroke-width="0.8"/>
    <line x1="25" y1="52" x2="50" y2="52" stroke="white" stroke-width="0.8"/>
  </g>

  <!-- Balance scales (justice/law) -->
  <g transform="translate(960, 420)" opacity="0.04" stroke="white" stroke-width="1" fill="none">
    <line x1="0" y1="-20" x2="0" y2="20"/>
    <line x1="-40" y1="0" x2="40" y2="0"/>
    <path d="M-40,0 L-50,20 L-30,20 Z"/>
    <path d="M40,0 L30,20 L50,20 Z"/>
    <circle cx="0" cy="-22" r="4"/>
  </g>

  <!-- Hexagonal pattern (governance network) -->
  <g stroke="white" stroke-width="0.3" fill="none" opacity="0.03">
    <polygon points="100,80 130,65 160,80 160,110 130,125 100,110"/>
    <polygon points="160,80 190,65 220,80 220,110 190,125 160,110"/>
    <polygon points="130,125 160,110 190,125 190,155 160,170 130,155"/>
    <polygon points="1700,70 1730,55 1760,70 1760,100 1730,115 1700,100"/>
    <polygon points="1760,70 1790,55 1820,70 1820,100 1790,115 1760,100"/>
    <polygon points="1730,115 1760,100 1790,115 1790,145 1760,160 1730,145"/>
  </g>

  <!-- Voting dots animation (representing legislative action) -->
  <g>
    <circle cx="650" cy="380" r="3" fill="#22c55e" opacity="0.08"><animate attributeName="opacity" values="0.04;0.12;0.04" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="670" cy="375" r="3" fill="#22c55e" opacity="0.06"><animate attributeName="opacity" values="0.03;0.1;0.03" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="690" cy="382" r="3" fill="#22c55e" opacity="0.07"><animate attributeName="opacity" values="0.04;0.11;0.04" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="710" cy="378" r="3" fill="#22c55e" opacity="0.09"><animate attributeName="opacity" values="0.05;0.13;0.05" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="1210" cy="378" r="3" fill="#22c55e" opacity="0.07"><animate attributeName="opacity" values="0.04;0.11;0.04" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="1230" cy="383" r="3" fill="#22c55e" opacity="0.08"><animate attributeName="opacity" values="0.03;0.12;0.03" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="1250" cy="376" r="3" fill="#22c55e" opacity="0.06"><animate attributeName="opacity" values="0.04;0.1;0.04" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="1270" cy="380" r="3" fill="#22c55e" opacity="0.09"><animate attributeName="opacity" values="0.05;0.14;0.05" dur="2.4s" repeatCount="indefinite"/></circle>
    <!-- A few red (nay) votes -->
    <circle cx="730" cy="376" r="3" fill="#ef4444" opacity="0.06"><animate attributeName="opacity" values="0.03;0.09;0.03" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="1290" cy="379" r="3" fill="#ef4444" opacity="0.05"><animate attributeName="opacity" values="0.02;0.08;0.02" dur="2.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Floating particles -->
  <circle cx="400" cy="100" r="1" fill="#60a5fa" opacity="0.12"><animate attributeName="opacity" values="0.06;0.16;0.06" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="1500" cy="120" r="1.2" fill="#a78bfa" opacity="0.1"><animate attributeName="opacity" values="0.05;0.14;0.05" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="800" cy="80" r="0.8" fill="white" opacity="0.12"><animate attributeName="opacity" values="0.06;0.18;0.06" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="1100" cy="70" r="1.1" fill="#60a5fa" opacity="0.08"><animate attributeName="opacity" values="0.04;0.12;0.04" dur="4.5s" repeatCount="indefinite"/></circle>
</svg>
