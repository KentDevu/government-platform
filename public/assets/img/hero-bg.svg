<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#020b1a"/>
      <stop offset="20%" stop-color="#071a3e"/>
      <stop offset="50%" stop-color="#0f3070"/>
      <stop offset="80%" stop-color="#1a4a8a"/>
      <stop offset="100%" stop-color="#2563a8"/>
    </linearGradient>
    <radialGradient id="sunset" cx="80%" cy="55%"  r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="30%" stop-color="#d97706" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#b45309" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="moon-glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#fcd34d" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="blur-sm"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blur-md"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="blur-lg"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>

  <!-- Base sky -->
  <rect width="1920" height="600" fill="url(#sky)"/>
  <!-- Warm sunset wash -->
  <rect width="1920" height="600" fill="url(#sunset)"/>

  <!-- Nebula / atmosphere glow -->
  <ellipse cx="1500" cy="300" rx="500" ry="250" fill="#3b82f6" opacity="0.06" filter="url(#blur-lg)"/>
  <ellipse cx="400" cy="150" rx="350" ry="200" fill="#6366f1" opacity="0.04" filter="url(#blur-lg)"/>

  <!-- Moon -->
  <circle cx="1480" cy="140" r="8" fill="url(#moon-glow)" filter="url(#blur-sm)"/>
  <circle cx="1480" cy="140" r="30" fill="#fef3c7" opacity="0.08" filter="url(#blur-md)"/>
  <circle cx="1480" cy="140" r="5" fill="#fef9c3" opacity="0.95"/>

  <!-- Star field -->
  <g opacity="0.7">
    <circle cx="120" cy="45" r="1.2" fill="white"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="80" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="480" cy="30" r="1" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="65" r="0.6" fill="white" opacity="0.4"/>
    <circle cx="780" cy="25" r="1.3" fill="white"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="55" r="0.7" fill="white" opacity="0.45"/>
    <circle cx="1100" cy="35" r="1.1" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1280" cy="70" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="1600" cy="50" r="1" fill="white"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="1750" cy="85" r="0.6" fill="white" opacity="0.35"/>
    <circle cx="1850" cy="40" r="0.9" fill="white" opacity="0.5"/>
    <circle cx="200" cy="130" r="0.5" fill="white" opacity="0.3"/>
    <circle cx="550" cy="115" r="0.7" fill="white" opacity="0.35"/>
    <circle cx="850" cy="100" r="0.5" fill="white" opacity="0.25"/>
    <circle cx="1350" cy="110" r="0.8" fill="white" opacity="0.3"/>
    <circle cx="1700" cy="120" r="0.6" fill="white" opacity="0.3"/>
  </g>

  <!-- Cloud layers (wispy) -->
  <g opacity="0.06" filter="url(#blur-md)">
    <ellipse cx="400" cy="180" rx="250" ry="25" fill="white"/>
    <ellipse cx="1200" cy="200" rx="300" ry="20" fill="white"/>
    <ellipse cx="1700" cy="170" rx="180" ry="18" fill="white"/>
    <ellipse cx="900" cy="150" rx="150" ry="15" fill="white"/>
  </g>

  <!-- Distant mountains (far, misty) -->
  <path d="M0 380 Q80 310 180 340 Q260 300 380 330 Q440 290 560 320 Q670 280 780 310 Q860 275 960 305 Q1050 270 1150 295 Q1260 260 1380 290 Q1480 260 1580 280 Q1680 255 1780 275 Q1850 260 1920 270 L1920 600 L0 600 Z" fill="#071830" opacity="0.9"/>
  <!-- Mountain snow caps -->
  <g opacity="0.05">
    <path d="M375 332 L380 330 L385 333" fill="white"/>
    <path d="M555 322 L560 320 L567 323" fill="white"/>
    <path d="M775 312 L780 310 L787 313" fill="white"/>
    <path d="M955 307 L960 305 L967 308" fill="white"/>
    <path d="M1145 297 L1150 295 L1157 298" fill="white"/>
  </g>

  <!-- Mid-range islands -->
  <path d="M0 430 Q60 390 150 410 Q240 370 360 400 Q450 365 550 390 Q660 355 770 380 Q870 350 970 375 Q1070 345 1180 372 Q1280 342 1380 365 Q1500 340 1600 358 Q1720 335 1820 350 L1920 355 L1920 600 L0 600 Z" fill="#0c2445" opacity="0.95"/>

  <!-- Vegetation on islands (tropical trees) -->
  <g opacity="0.12">
    <path d="M340 400 Q345 380 350 400 Q355 382 360 400" fill="#166534"/>
    <path d="M540 390 Q545 368 550 390 Q555 370 560 390" fill="#166534"/>
    <path d="M760 380 Q765 358 770 380 Q775 360 780 380" fill="#166534"/>
    <path d="M1170 372 Q1175 350 1180 372 Q1185 352 1190 372" fill="#166534"/>
  </g>

  <!-- Closest island landmass -->
  <path d="M0 475 Q100 440 220 460 Q340 430 460 450 Q570 420 680 445 Q800 415 920 440 Q1040 415 1150 435 Q1280 410 1400 430 Q1520 408 1640 425 Q1760 405 1850 418 L1920 420 L1920 600 L0 600 Z" fill="#0a1e3e"/>

  <!-- Water surface -->
  <rect y="460" width="1920" height="140" fill="#071a35" opacity="0.97"/>

  <!-- Water reflections (shimmer) -->
  <g opacity="0.06">
    <line x1="200" y1="475" x2="320" y2="475" stroke="#fef3c7" stroke-width="0.8"/>
    <line x1="500" y1="480" x2="580" y2="480" stroke="white" stroke-width="0.5"/>
    <line x1="750" y1="478" x2="850" y2="478" stroke="white" stroke-width="0.5"/>
    <line x1="1000" y1="482" x2="1080" y2="482" stroke="white" stroke-width="0.5"/>
    <line x1="1350" y1="476" x2="1500" y2="476" stroke="#fef3c7" stroke-width="0.8"/>
    <line x1="1600" y1="480" x2="1680" y2="480" stroke="white" stroke-width="0.5"/>
    <line x1="300" y1="500" x2="360" y2="500" stroke="white" stroke-width="0.3"/>
    <line x1="600" y1="505" x2="650" y2="505" stroke="white" stroke-width="0.3"/>
    <line x1="900" y1="498" x2="940" y2="498" stroke="white" stroke-width="0.3"/>
    <line x1="1200" y1="502" x2="1260" y2="502" stroke="white" stroke-width="0.4"/>
    <line x1="1500" y1="500" x2="1580" y2="500" stroke="#fef3c7" stroke-width="0.5"/>
    <line x1="1700" y1="495" x2="1740" y2="495" stroke="white" stroke-width="0.3"/>
  </g>

  <!-- Moon reflection on water -->
  <ellipse cx="1480" cy="470" rx="60" ry="3" fill="#fef3c7" opacity="0.06" filter="url(#blur-sm)"/>
  <ellipse cx="1480" cy="485" rx="30" ry="1.5" fill="#fef3c7" opacity="0.04"/>
  <ellipse cx="1480" cy="500" rx="15" ry="1" fill="#fef3c7" opacity="0.02"/>

  <!-- Palm trees silhouettes (right foreground) -->
  <g opacity="0.2">
    <!-- Tall palm -->
    <path d="M1680 460 Q1685 400 1678 340 Q1682 280 1680 220" stroke="#0a1628" stroke-width="4" fill="none"/>
    <path d="M1680 220 Q1640 215 1610 240" stroke="#0a1628" stroke-width="2.5" fill="none"/>
    <path d="M1680 220 Q1645 200 1620 210" stroke="#0a1628" stroke-width="2.5" fill="none"/>
    <path d="M1680 220 Q1650 190 1635 185" stroke="#0a1628" stroke-width="2" fill="none"/>
    <path d="M1680 220 Q1710 210 1740 230" stroke="#0a1628" stroke-width="2.5" fill="none"/>
    <path d="M1680 220 Q1715 195 1745 200" stroke="#0a1628" stroke-width="2.5" fill="none"/>
    <path d="M1680 220 Q1705 190 1720 180" stroke="#0a1628" stroke-width="2" fill="none"/>
    <!-- Short palm -->
    <path d="M1760 460 Q1758 420 1762 380 Q1760 340 1758 300" stroke="#0a1628" stroke-width="3" fill="none"/>
    <path d="M1758 300 Q1730 295 1710 310" stroke="#0a1628" stroke-width="2" fill="none"/>
    <path d="M1758 300 Q1735 280 1720 278" stroke="#0a1628" stroke-width="2" fill="none"/>
    <path d="M1758 300 Q1780 290 1800 300" stroke="#0a1628" stroke-width="2" fill="none"/>
    <path d="M1758 300 Q1785 280 1800 275" stroke="#0a1628" stroke-width="2" fill="none"/>
  </g>

  <!-- Boat silhouette on water -->
  <g transform="translate(1100, 455)" opacity="0.1">
    <path d="M0 0 Q15 8 30 0 L28 -2 Q15 3 2 -2 Z" fill="white"/>
    <line x1="15" y1="-2" x2="15" y2="-15" stroke="white" stroke-width="0.8"/>
    <path d="M15 -15 L25 -8 L15 -3" fill="white" opacity="0.6"/>
  </g>

  <!-- Light particles (fireflies/ambient) -->
  <g>
    <circle cx="300" cy="400" r="1.5" fill="#fef3c7" opacity="0.15"><animate attributeName="opacity" values="0.05;0.2;0.05" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="350" r="1" fill="#fef3c7" opacity="0.1"><animate attributeName="opacity" values="0.03;0.15;0.03" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="380" r="1.2" fill="#fef3c7" opacity="0.12"><animate attributeName="opacity" values="0.04;0.18;0.04" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1300" cy="360" r="0.8" fill="#fef3c7" opacity="0.08"><animate attributeName="opacity" values="0.02;0.12;0.02" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="430" r="1" fill="#93c5fd" opacity="0.08"><animate attributeName="opacity" values="0.03;0.12;0.03" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="420" r="0.8" fill="#93c5fd" opacity="0.06"><animate attributeName="opacity" values="0.02;0.1;0.02" dur="5.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>
