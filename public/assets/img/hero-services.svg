<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#020b1a"/>
      <stop offset="30%" stop-color="#071a3e"/>
      <stop offset="60%" stop-color="#0c2d6b"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <radialGradient id="glow1" cx="70%" cy="40%"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/><stop offset="100%" stop-color="transparent"/></radialGradient>
    <radialGradient id="glow2" cx="20%" cy="60%"><stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/><stop offset="100%" stop-color="transparent"/></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="blur-sm"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="1920" height="500" fill="url(#bg)"/>
  <rect width="1920" height="500" fill="url(#glow1)"/>
  <rect width="1920" height="500" fill="url(#glow2)"/>

  <!-- Circuit board pattern (subtle) -->
  <g stroke="white" stroke-width="0.5" fill="none" opacity="0.04">
    <path d="M0 100 H400 V200 H600 V150 H800"/>
    <path d="M1920 80 H1500 V180 H1300 V120 H1100"/>
    <path d="M0 350 H300 V300 H500"/>
    <path d="M1920 400 H1600 V320 H1400"/>
    <path d="M600 0 V120 H700 V250"/>
    <path d="M1300 0 V100 H1200 V200"/>
    <path d="M900 500 V350 H1000 V250"/>
    <path d="M400 500 V400 H500 V350"/>
  </g>

  <!-- Hexagonal grid pattern -->
  <g stroke="white" stroke-width="0.3" fill="none" opacity="0.03">
    <polygon points="960,100 990,117 990,152 960,170 930,152 930,117"/>
    <polygon points="1020,100 1050,117 1050,152 1020,170 990,152 990,117"/>
    <polygon points="990,152 1020,170 1020,205 990,222 960,205 960,170"/>
    <polygon points="900,100 930,117 930,152 900,170 870,152 870,117"/>
    <polygon points="930,152 960,170 960,205 930,222 900,205 900,170"/>
    <polygon points="1050,152 1080,170 1080,205 1050,222 1020,205 1020,170"/>
  </g>

  <!-- Main network visualization -->
  <!-- Central hub -->
  <circle cx="960" cy="250" r="45" fill="none" stroke="white" stroke-width="1" opacity="0.12"/>
  <circle cx="960" cy="250" r="35" fill="none" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <circle cx="960" cy="250" r="25" fill="#3b82f6" opacity="0.1" filter="url(#blur-sm)"/>
  <circle cx="960" cy="250" r="8" fill="white" opacity="0.15"/>

  <!-- Orbital rings around hub -->
  <ellipse cx="960" cy="250" rx="120" ry="60" fill="none" stroke="white" stroke-width="0.4" stroke-dasharray="4 6" opacity="0.06" transform="rotate(-15 960 250)"/>
  <ellipse cx="960" cy="250" rx="180" ry="90" fill="none" stroke="white" stroke-width="0.3" stroke-dasharray="3 8" opacity="0.04" transform="rotate(10 960 250)"/>

  <!-- Service nodes with connections -->
  <!-- Passport node (top-left) -->
  <line x1="960" y1="250" x2="700" y2="130" stroke="white" stroke-width="0.6" opacity="0.08"/>
  <circle cx="700" cy="130" r="30" fill="white" opacity="0.04" stroke="white" stroke-width="0.8" stroke-opacity="0.12"/>
  <circle cx="700" cy="130" r="18" fill="#3b82f6" opacity="0.06"/>
  <rect x="690" y="118" width="20" height="24" rx="3" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <circle cx="700" cy="126" r="3.5" fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <line x1="694" y1="135" x2="706" y2="135" stroke="white" stroke-width="0.6" opacity="0.2"/>

  <!-- ID node (top-right) -->
  <line x1="960" y1="250" x2="1250" y2="120" stroke="white" stroke-width="0.6" opacity="0.08"/>
  <circle cx="1250" cy="120" r="28" fill="white" opacity="0.04" stroke="white" stroke-width="0.8" stroke-opacity="0.12"/>
  <circle cx="1250" cy="120" r="16" fill="#8b5cf6" opacity="0.06"/>
  <rect x="1236" y="108" width="28" height="18" rx="2" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <rect x="1240" y="112" width="6" height="6" rx="1" fill="white" opacity="0.15"/>

  <!-- Payment node (right) -->
  <line x1="960" y1="250" x2="1350" y2="280" stroke="white" stroke-width="0.6" opacity="0.08"/>
  <circle cx="1350" cy="280" r="32" fill="white" opacity="0.04" stroke="white" stroke-width="0.8" stroke-opacity="0.12"/>
  <circle cx="1350" cy="280" r="18" fill="#f59e0b" opacity="0.06"/>
  <circle cx="1350" cy="278" r="10" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <text x="1350" y="282" text-anchor="middle" fill="white" opacity="0.3" font-size="10" font-weight="600">&#8369;</text>

  <!-- Health node (left) -->
  <line x1="960" y1="250" x2="580" y2="280" stroke="white" stroke-width="0.6" opacity="0.08"/>
  <circle cx="580" cy="280" r="28" fill="white" opacity="0.04" stroke="white" stroke-width="0.8" stroke-opacity="0.12"/>
  <circle cx="580" cy="280" r="16" fill="#ef4444" opacity="0.06"/>
  <line x1="572" y1="280" x2="588" y2="280" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="580" y1="272" x2="580" y2="288" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Education node (bottom-left) -->
  <line x1="960" y1="250" x2="750" y2="380" stroke="white" stroke-width="0.6" opacity="0.08"/>
  <circle cx="750" cy="380" r="26" fill="white" opacity="0.04" stroke="white" stroke-width="0.8" stroke-opacity="0.12"/>
  <circle cx="750" cy="380" r="15" fill="#10b981" opacity="0.06"/>
  <polygon points="750,370 762,378 750,382 738,378" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>

  <!-- Tax node (bottom-right) -->
  <line x1="960" y1="250" x2="1200" y2="390" stroke="white" stroke-width="0.6" opacity="0.08"/>
  <circle cx="1200" cy="390" r="26" fill="white" opacity="0.04" stroke="white" stroke-width="0.8" stroke-opacity="0.12"/>
  <circle cx="1200" cy="390" r="15" fill="#f97316" opacity="0.06"/>
  <rect x="1191" y="381" width="18" height="14" rx="2" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="1195" y1="386" x2="1205" y2="386" stroke="white" stroke-width="0.6" opacity="0.2"/>
  <line x1="1195" y1="390" x2="1202" y2="390" stroke="white" stroke-width="0.6" opacity="0.15"/>

  <!-- Secondary connections between nodes -->
  <line x1="700" y1="130" x2="580" y2="280" stroke="white" stroke-width="0.3" stroke-dasharray="3 5" opacity="0.04"/>
  <line x1="1250" y1="120" x2="1350" y2="280" stroke="white" stroke-width="0.3" stroke-dasharray="3 5" opacity="0.04"/>
  <line x1="750" y1="380" x2="1200" y2="390" stroke="white" stroke-width="0.3" stroke-dasharray="3 5" opacity="0.04"/>

  <!-- Data flow particles along connections -->
  <circle r="2" fill="#60a5fa" opacity="0.4">
    <animateMotion dur="4s" repeatCount="indefinite" path="M960,250 L700,130"/>
  </circle>
  <circle r="1.5" fill="#a78bfa" opacity="0.3">
    <animateMotion dur="5s" repeatCount="indefinite" path="M960,250 L1350,280"/>
  </circle>
  <circle r="1.5" fill="#34d399" opacity="0.3">
    <animateMotion dur="4.5s" repeatCount="indefinite" path="M960,250 L580,280"/>
  </circle>

  <!-- Floating particles -->
  <g>
    <circle cx="400" cy="100" r="1.5" fill="#60a5fa" opacity="0.2"><animate attributeName="cy" values="100;90;100" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1500" cy="150" r="1" fill="#a78bfa" opacity="0.15"><animate attributeName="cy" values="150;140;150" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="350" r="1.2" fill="#60a5fa" opacity="0.12"><animate attributeName="cy" values="350;340;350" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1700" cy="400" r="1" fill="#c084fc" opacity="0.1"><animate attributeName="cy" values="400;390;400" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="80" r="0.8" fill="white" opacity="0.2"><animate attributeName="opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Bottom subtle wave -->
  <path d="M0 480 Q200 460 400 475 Q600 490 800 470 Q1000 455 1200 475 Q1400 490 1600 468 Q1800 452 1920 470 L1920 500 L0 500 Z" fill="#020b1a" opacity="0.5"/>
</svg>
