<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-exec" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="gold-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sun-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fcd116" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fcd116" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-exec"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blur-lg"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="1920" height="500" fill="url(#bg-exec)"/>

  <!-- Atmospheric glow -->
  <ellipse cx="960" cy="250" rx="500" ry="250" fill="#fcd116" opacity="0.03" filter="url(#blur-lg)"/>
  <ellipse cx="400" cy="200" rx="300" ry="200" fill="#312e81" opacity="0.05" filter="url(#blur-lg)"/>
  <ellipse cx="1500" cy="250" rx="300" ry="200" fill="#1e3a5f" opacity="0.06" filter="url(#blur-lg)"/>

  <!-- Philippine Sun (large, subtle, top center) -->
  <g transform="translate(960, 100)">
    <circle cx="0" cy="0" r="80" fill="url(#sun-glow)">
      <animate attributeName="r" values="75;85;75" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#fcd116" stroke-width="0.5" opacity="0.06"/>
    <!-- 8 rays of the sun -->
    <g opacity="0.05" stroke="#fcd116" stroke-width="1.5">
      <line x1="0" y1="-40" x2="0" y2="-70"/>
      <line x1="28" y1="-28" x2="50" y2="-50"/>
      <line x1="40" y1="0" x2="70" y2="0"/>
      <line x1="28" y1="28" x2="50" y2="50"/>
      <line x1="0" y1="40" x2="0" y2="70"/>
      <line x1="-28" y1="28" x2="-50" y2="50"/>
      <line x1="-40" y1="0" x2="-70" y2="0"/>
      <line x1="-28" y1="-28" x2="-50" y2="-50"/>
    </g>
    <!-- 3 Philippine stars (subtle) -->
    <polygon points="0,-8 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3" fill="#fcd116" opacity="0.04" transform="translate(-120, 60)"/>
    <polygon points="0,-8 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3" fill="#fcd116" opacity="0.04" transform="translate(120, 60)"/>
    <polygon points="0,-8 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3" fill="#fcd116" opacity="0.04" transform="translate(0, 120)"/>
  </g>

  <!-- Malacañang Palace silhouette -->
  <g transform="translate(560, 200)" opacity="0.08">
    <!-- Main body -->
    <rect x="0" y="80" width="800" height="220" fill="white"/>
    <!-- Central pediment -->
    <polygon points="280,80 400,30 520,80" fill="white"/>
    <!-- Tower/cupola -->
    <rect x="370" y="0" width="60" height="30" fill="white"/>
    <polygon points="370,0 400,-18 430,0" fill="white"/>
    <!-- Flag pole -->
    <line x1="400" y1="-18" x2="400" y2="-50" stroke="white" stroke-width="1"/>
    <rect x="400" y="-50" width="18" height="10" fill="#ce1126" opacity="0.15"/>
    <!-- Columns (10) -->
    <g opacity="1">
      <rect x="290" y="80" width="8" height="60" fill="white"/>
      <rect x="318" y="80" width="8" height="60" fill="white"/>
      <rect x="346" y="80" width="8" height="60" fill="white"/>
      <rect x="374" y="80" width="8" height="60" fill="white"/>
      <rect x="402" y="80" width="8" height="60" fill="white"/>
      <rect x="430" y="80" width="8" height="60" fill="white"/>
      <rect x="458" y="80" width="8" height="60" fill="white"/>
      <rect x="486" y="80" width="8" height="60" fill="white"/>
      <rect x="514" y="80" width="8" height="60" fill="white"/>
    </g>
    <!-- Windows row 1 -->
    <g fill="#60a5fa" opacity="0.4">
      <rect x="30" y="100" width="14" height="16" rx="2"/>
      <rect x="60" y="100" width="14" height="16" rx="2"/>
      <rect x="90" y="100" width="14" height="16" rx="2"/>
      <rect x="120" y="100" width="14" height="16" rx="2"/>
      <rect x="150" y="100" width="14" height="16" rx="2"/>
      <rect x="200" y="100" width="14" height="16" rx="2"/>
      <rect x="230" y="100" width="14" height="16" rx="2"/>
      <rect x="560" y="100" width="14" height="16" rx="2"/>
      <rect x="590" y="100" width="14" height="16" rx="2"/>
      <rect x="640" y="100" width="14" height="16" rx="2"/>
      <rect x="670" y="100" width="14" height="16" rx="2"/>
      <rect x="700" y="100" width="14" height="16" rx="2"/>
      <rect x="730" y="100" width="14" height="16" rx="2"/>
      <rect x="760" y="100" width="14" height="16" rx="2"/>
    </g>
    <!-- Golden light in windows (animated) -->
    <g fill="#fbbf24" opacity="0.3">
      <rect x="310" y="155" width="14" height="16" rx="2"><animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/></rect>
      <rect x="345" y="155" width="14" height="16" rx="2"><animate attributeName="opacity" values="0.25;0.45;0.25" dur="4s" repeatCount="indefinite"/></rect>
      <rect x="380" y="155" width="14" height="16" rx="2"><animate attributeName="opacity" values="0.3;0.5;0.3" dur="3.5s" repeatCount="indefinite"/></rect>
      <rect x="415" y="155" width="14" height="16" rx="2"><animate attributeName="opacity" values="0.2;0.4;0.2" dur="4.5s" repeatCount="indefinite"/></rect>
      <rect x="450" y="155" width="14" height="16" rx="2"><animate attributeName="opacity" values="0.25;0.45;0.25" dur="3.2s" repeatCount="indefinite"/></rect>
      <rect x="485" y="155" width="14" height="16" rx="2"><animate attributeName="opacity" values="0.3;0.5;0.3" dur="5s" repeatCount="indefinite"/></rect>
    </g>
    <!-- Entrance -->
    <rect x="380" y="240" width="40" height="60" rx="8" fill="white" opacity="1.2"/>
    <!-- Steps -->
    <rect x="-20" y="300" width="840" height="5" rx="1" fill="white"/>
    <rect x="-30" y="305" width="860" height="4" rx="1" fill="white" opacity="0.6"/>
    <!-- Wings -->
    <rect x="-80" y="120" width="80" height="180" fill="white" opacity="0.7"/>
    <rect x="800" y="120" width="80" height="180" fill="white" opacity="0.7"/>
  </g>

  <!-- Golden reflection below palace -->
  <rect x="560" y="510" width="800" height="6" rx="2" fill="url(#gold-glow)"/>

  <!-- Tree silhouettes framing -->
  <g opacity="0.04" fill="white">
    <ellipse cx="200" cy="350" rx="80" ry="100"/>
    <rect x="196" y="350" width="8" height="100"/>
    <ellipse cx="80" cy="380" rx="60" ry="80"/>
    <rect x="76" y="380" width="8" height="90"/>
    <ellipse cx="1720" cy="340" rx="90" ry="110"/>
    <rect x="1716" y="340" width="8" height="110"/>
    <ellipse cx="1840" cy="370" rx="70" ry="90"/>
    <rect x="1836" y="370" width="8" height="100"/>
  </g>

  <!-- Floating ambient particles -->
  <circle cx="250" cy="120" r="1" fill="#fcd116" opacity="0.12"><animate attributeName="opacity" values="0.05;0.15;0.05" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="1650" cy="100" r="1.2" fill="#fcd116" opacity="0.1"><animate attributeName="opacity" values="0.04;0.12;0.04" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="80" r="0.8" fill="white" opacity="0.1"><animate attributeName="opacity" values="0.05;0.15;0.05" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="1200" cy="90" r="1" fill="#a78bfa" opacity="0.08"><animate attributeName="opacity" values="0.04;0.12;0.04" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="180" r="0.7" fill="#60a5fa" opacity="0.1"><animate attributeName="opacity" values="0.05;0.15;0.05" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="1500" cy="150" r="1.3" fill="#fbbf24" opacity="0.07"><animate attributeName="opacity" values="0.03;0.1;0.03" dur="5.5s" repeatCount="indefinite"/></circle>
</svg>
