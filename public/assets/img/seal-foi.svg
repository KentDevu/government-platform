<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Outer decorative ring -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#135BEC" stroke-width="2" opacity="0.4"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#135BEC" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.3"/>
  <!-- Inner fill -->
  <circle cx="60" cy="60" r="44" fill="#135BEC" opacity="0.06"/>
  <circle cx="60" cy="60" r="44" fill="none" stroke="#135BEC" stroke-width="1.5" opacity="0.4"/>
  <!-- Document icon -->
  <rect x="42" y="32" width="32" height="42" rx="3" fill="white" stroke="#135BEC" stroke-width="1.5" opacity="0.8"/>
  <path d="M62 32 L74 44 L62 44 Z" fill="#C7D2FE" stroke="#135BEC" stroke-width="1" opacity="0.6"/>
  <!-- Text lines -->
  <line x1="48" y1="52" x2="68" y2="52" stroke="#135BEC" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="48" y1="58" x2="64" y2="58" stroke="#135BEC" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="48" y1="64" x2="60" y2="64" stroke="#135BEC" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Eye/visibility icon at bottom -->
  <g transform="translate(60, 88)">
    <ellipse cx="0" cy="0" rx="12" ry="7" fill="none" stroke="#135BEC" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#135BEC" opacity="0.5"/>
    <circle cx="0" cy="0" r="2" fill="#135BEC" opacity="0.8"/>
  </g>
  <!-- Corner dots -->
  <circle cx="18" cy="18" r="2.5" fill="#FCD116" opacity="0.5"/>
  <circle cx="102" cy="18" r="2.5" fill="#FCD116" opacity="0.5"/>
  <circle cx="18" cy="102" r="2.5" fill="#FCD116" opacity="0.5"/>
  <circle cx="102" cy="102" r="2.5" fill="#FCD116" opacity="0.5"/>
</svg>
