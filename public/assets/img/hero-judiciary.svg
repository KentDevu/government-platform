<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-jud" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0c0c1d"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#1e1e4a"/>
    </linearGradient>
    <radialGradient id="justice-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-jud"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="1920" height="500" fill="url(#bg-jud)"/>

  <!-- Ambient glows -->
  <ellipse cx="960" cy="200" rx="500" ry="250" fill="#7c3aed" opacity="0.03" filter="url(#blur-jud)"/>
  <ellipse cx="300" cy="350" rx="300" ry="200" fill="#1e1b4b" opacity="0.05" filter="url(#blur-jud)"/>
  <ellipse cx="1600" cy="300" rx="300" ry="200" fill="#1e1b4b" opacity="0.04" filter="url(#blur-jud)"/>

  <!-- Supreme Court building silhouette -->
  <g transform="translate(510, 140)">
    <!-- Base platform -->
    <rect x="-50" y="310" width="1000" height="8" rx="2" fill="white" opacity="0.04"/>
    <rect x="-30" y="305" width="960" height="5" rx="1" fill="white" opacity="0.05"/>
    <!-- Main body -->
    <rect x="0" y="100" width="900" height="205" fill="white" opacity="0.06"/>
    <!-- Central portico -->
    <rect x="250" y="60" width="400" height="245" fill="white" opacity="0.08"/>
    <!-- Triangular pediment -->
    <polygon points="240,60 450,-10 660,60" fill="white" opacity="0.07"/>
    <!-- Pediment detail - Lady Justice relief -->
    <g transform="translate(450, 20)" opacity="0.04" fill="white">
      <circle cx="0" cy="0" r="6"/>
      <line x1="0" y1="6" x2="0" y2="25" stroke="white" stroke-width="1.5"/>
      <line x1="-12" y1="14" x2="12" y2="14" stroke="white" stroke-width="1.2"/>
    </g>
    <!-- Grand columns (12) -->
    <g opacity="0.1">
      <rect x="260" y="60" width="10" height="140" fill="white"/>
      <rect x="290" y="60" width="10" height="140" fill="white"/>
      <rect x="320" y="60" width="10" height="140" fill="white"/>
      <rect x="350" y="60" width="10" height="140" fill="white"/>
      <rect x="380" y="60" width="10" height="140" fill="white"/>
      <rect x="410" y="60" width="10" height="140" fill="white"/>
      <rect x="440" y="60" width="10" height="140" fill="white"/>
      <rect x="470" y="60" width="10" height="140" fill="white"/>
      <rect x="500" y="60" width="10" height="140" fill="white"/>
      <rect x="530" y="60" width="10" height="140" fill="white"/>
      <rect x="560" y="60" width="10" height="140" fill="white"/>
      <rect x="590" y="60" width="10" height="140" fill="white"/>
    </g>
    <!-- Windows (wing sections) -->
    <g fill="#818cf8" opacity="0.2">
      <rect x="30" y="130" width="14" height="18" rx="2"/>
      <rect x="60" y="130" width="14" height="18" rx="2"/>
      <rect x="90" y="130" width="14" height="18" rx="2"/>
      <rect x="120" y="130" width="14" height="18" rx="2"/>
      <rect x="150" y="130" width="14" height="18" rx="2"/>
      <rect x="180" y="130" width="14" height="18" rx="2"/>
      <rect x="700" y="130" width="14" height="18" rx="2"/>
      <rect x="730" y="130" width="14" height="18" rx="2"/>
      <rect x="760" y="130" width="14" height="18" rx="2"/>
      <rect x="790" y="130" width="14" height="18" rx="2"/>
      <rect x="820" y="130" width="14" height="18" rx="2"/>
      <rect x="850" y="130" width="14" height="18" rx="2"/>
    </g>
    <!-- Windows row 2 -->
    <g fill="#818cf8" opacity="0.15">
      <rect x="30" y="170" width="14" height="18" rx="2"/>
      <rect x="60" y="170" width="14" height="18" rx="2"/>
      <rect x="90" y="170" width="14" height="18" rx="2"/>
      <rect x="120" y="170" width="14" height="18" rx="2"/>
      <rect x="150" y="170" width="14" height="18" rx="2"/>
      <rect x="180" y="170" width="14" height="18" rx="2"/>
      <rect x="700" y="170" width="14" height="18" rx="2"/>
      <rect x="730" y="170" width="14" height="18" rx="2"/>
      <rect x="760" y="170" width="14" height="18" rx="2"/>
      <rect x="790" y="170" width="14" height="18" rx="2"/>
      <rect x="820" y="170" width="14" height="18" rx="2"/>
      <rect x="850" y="170" width="14" height="18" rx="2"/>
    </g>
    <!-- Grand entrance -->
    <rect x="415" y="240" width="70" height="65" rx="10" fill="white" opacity="0.1"/>
    <!-- Central illumination -->
    <rect x="420" y="210" width="60" height="25" rx="4" fill="#818cf8" opacity="0.12">
      <animate attributeName="opacity" values="0.08;0.15;0.08" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Large scales of justice (iconic, centered above) -->
  <g transform="translate(960, 80)" opacity="0.05" stroke="white" stroke-width="1.2" fill="none">
    <!-- Pillar -->
    <line x1="0" y1="-25" x2="0" y2="40"/>
    <!-- Base -->
    <rect x="-15" y="38" width="30" height="4" rx="2"/>
    <!-- Crossbar -->
    <line x1="-60" y1="-15" x2="60" y2="-15"/>
    <!-- Left pan -->
    <line x1="-60" y1="-15" x2="-70" y2="10"/>
    <line x1="-60" y1="-15" x2="-50" y2="10"/>
    <path d="M-75,10 Q-60,22 -45,10" fill="white" opacity="0.3"/>
    <!-- Right pan -->
    <line x1="60" y1="-15" x2="50" y2="10"/>
    <line x1="60" y1="-15" x2="70" y2="10"/>
    <path d="M45,10 Q60,22 75,10" fill="white" opacity="0.3"/>
    <!-- Crown -->
    <circle cx="0" cy="-28" r="5"/>
    <!-- Gentle sway animation -->
    <animateTransform attributeName="transform" type="rotate" values="-1 960 80;1 960 80;-1 960 80" dur="8s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Legal text / law book motifs -->
  <!-- Left side book stack -->
  <g transform="translate(150, 320)" opacity="0.04" fill="white">
    <rect x="0" y="0" width="50" height="8" rx="1"/>
    <rect x="-3" y="10" width="56" height="8" rx="1"/>
    <rect x="2" y="20" width="46" height="8" rx="1"/>
    <rect x="-1" y="30" width="52" height="8" rx="1"/>
  </g>
  <!-- Right side gavel -->
  <g transform="translate(1700, 350)" opacity="0.04" fill="white">
    <rect x="0" y="0" width="40" height="14" rx="4"/>
    <rect x="16" y="14" width="8" height="30" rx="2"/>
    <rect x="10" y="44" width="20" height="5" rx="2"/>
  </g>

  <!-- Orbiting justice circle rings -->
  <g stroke="white" stroke-width="0.3" fill="none" opacity="0.03">
    <ellipse cx="960" cy="300" rx="400" ry="60"/>
    <ellipse cx="960" cy="300" rx="350" ry="45"/>
  </g>

  <!-- Dot nodes on orbit -->
  <circle cx="560" cy="300" r="2" fill="#818cf8" opacity="0.08">
    <animate attributeName="opacity" values="0.04;0.12;0.04" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1360" cy="300" r="2" fill="#818cf8" opacity="0.06">
    <animate attributeName="opacity" values="0.03;0.1;0.03" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="960" cy="240" r="2" fill="#c084fc" opacity="0.07">
    <animate attributeName="opacity" values="0.04;0.11;0.04" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="960" cy="360" r="2" fill="#c084fc" opacity="0.05">
    <animate attributeName="opacity" values="0.03;0.09;0.03" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating ambient particles -->
  <circle cx="300" cy="120" r="1" fill="#c084fc" opacity="0.12"><animate attributeName="opacity" values="0.06;0.16;0.06" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="1600" cy="100" r="1.2" fill="#818cf8" opacity="0.1"><animate attributeName="opacity" values="0.05;0.14;0.05" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="70" r="0.8" fill="white" opacity="0.1"><animate attributeName="opacity" values="0.05;0.15;0.05" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="1200" cy="80" r="1.1" fill="#a78bfa" opacity="0.08"><animate attributeName="opacity" values="0.04;0.12;0.04" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="500" cy="200" r="0.7" fill="#60a5fa" opacity="0.09"><animate attributeName="opacity" values="0.04;0.13;0.04" dur="5.5s" repeatCount="indefinite"/></circle>
  <circle cx="1400" cy="170" r="1.3" fill="#c084fc" opacity="0.07"><animate attributeName="opacity" values="0.03;0.1;0.03" dur="6s" repeatCount="indefinite"/></circle>
</svg>
